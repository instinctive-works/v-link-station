<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V-Link Station</title>
  <link rel="stylesheet" href="/mocap.css" />
</head>
<body>

  <!-- ── Main layout ─────────────────────────────────────────── -->
  <div id="main-layout">
    <!-- Canvas area -->
    <div id="canvas-area">
      <div id="canvas-title">V-Link Station</div>
      <!-- graph-viewport: receives CSS transform for pan/zoom -->
      <div id="graph-viewport">
        <svg id="conn-svg"></svg>
        <div id="node-canvas"></div>
      </div>
    </div>

    <!-- Panel resize handle -->
    <div id="panel-resize-handle"></div>

    <!-- Right panel -->
    <div id="right-panel">
      <div id="panel-header">
        <button class="panel-tab active" id="tab-nodes" onclick="window.switchRightTab('nodes')">ノード一覧</button>
        <button class="panel-tab" id="tab-takes" onclick="window.switchRightTab('takes')">収録一覧</button>
      </div>
      <div id="panel-content">
        <p class="panel-placeholder">ノードを選択してください</p>
      </div>
    </div>
  </div>

  <!-- ── Context menu ────────────────────────────────────── -->
  <div id="ctx-menu" class="context-menu hidden"></div>

  <!-- ── Scripts ────────────────────────────────────────── -->
  <!-- Socket.IO client -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Shared constants (browser mode) -->
  <script src="/shared/constants.js"></script>
  <!-- WASM video frame processor (async init, starts fetching early) -->
  <script src="/wasm-video/loader.js"></script>
  <!-- Main canvas infrastructure -->
  <script src="/mocap.js"></script>

  <!-- Node plugins -->
  <script src="/protocols/livelink-face/renderer.js"></script>
  <script src="/protocols/livelink-face/node.js"></script>
  <script src="/protocols/webcam/node.js"></script>
  <script src="/protocols/screen-capture/node.js"></script>
  <script src="/protocols/video-share/node.js"></script>
  <script src="/protocols/livelink-mb/node.js"></script>
  <script src="/protocols/vmc/node.js"></script>
  <script src="/protocols/mocopi/node.js"></script>
  <script src="/protocols/video-switch/node.js"></script>
  <script src="/protocols/countdown/node.js"></script>
  <script src="/protocols/merge/node.js"></script>
  <script src="/protocols/override/node.js"></script>
</body>
</html>
